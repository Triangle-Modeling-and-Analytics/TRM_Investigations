<style>
  :root{
    --bg:#eceef2; --card:#ffffff; --ink:#191c22; --muted:#6b7280;
    --hair:#e2e5eb; --slate:#8c93a0; --focus:#10131a;
    --ui: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    --mono: ui-monospace, "SF Mono", "JetBrains Mono", Menlo, Consolas, monospace;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{
    background:var(--bg); color:var(--ink); font-family:var(--ui);
    -webkit-font-smoothing:antialiased; display:flex; flex-direction:column;
    min-height:100%;
  }
  header{
    padding:20px 26px 14px; border-bottom:1px solid var(--hair);
    display:flex; flex-wrap:wrap; align-items:flex-end; gap:18px 28px; background:var(--card);
  }
  .title-wrap{flex:1 1 320px; min-width:280px}
  h1{
    font-size:21px; font-weight:700; letter-spacing:-.015em; margin:0 0 3px;
    line-height:1.12;
  }
  h1 .ext{color:#1b66c9} h1 .int{color:#3f4753}
  .sub{font-size:12.5px; color:var(--muted); margin:0; line-height:1.3}
  .controls{display:flex; flex-wrap:wrap; align-items:center; gap:18px}
  .ctl{display:flex; flex-direction:column; gap:5px}
  .ctl label{font-size:10.5px; letter-spacing:.07em; text-transform:uppercase; color:var(--muted); font-weight:600}
  .readout{font-family:var(--mono); font-size:12px; color:var(--ink)}
  .minrow{display:flex; align-items:center; gap:6px; font-family:var(--mono); font-size:12px; color:var(--ink)}
  .minrow .ge{color:var(--muted)}
  .minrow .unit{color:var(--muted)}
  #thrNum{
    width:78px; font-family:var(--mono); font-size:12px; color:var(--ink);
    background:var(--card); border:1px solid var(--hair); border-radius:6px;
    padding:5px 7px; text-align:right; -moz-appearance:textfield;
  }
  #thrNum:hover{border-color:#bcc2cd}
  #thrNum:focus-visible{outline:2px solid #1b66c9; outline-offset:1px; border-color:#1b66c9}
  input[type=range]{width:210px; accent-color:#1b66c9; cursor:pointer}
  .btns{display:flex; gap:8px}
  button{
    font-family:var(--ui); font-size:12px; font-weight:600; color:var(--ink);
    background:var(--card); border:1px solid var(--hair); border-radius:7px;
    padding:7px 12px; cursor:pointer; transition:border-color .15s, background .15s;
  }
  button:hover{border-color:#bcc2cd}
  button.on{background:#10131a; color:#fff; border-color:#10131a}
  button:focus-visible{outline:2px solid #1b66c9; outline-offset:2px}
  main{flex:1 1 auto; position:relative; min-height:0; display:flex; gap:0}
  .panel{position:relative; min-width:0; min-height:0; display:flex; flex-direction:column}
  #chordPanel{flex:1.32 1 0}
  #mapPanel{flex:1 1 0; border-left:1px solid var(--hair)}
  .panel-cap{
    position:absolute; top:10px; left:16px; z-index:5; font-family:var(--mono);
    font-size:10.5px; letter-spacing:.08em; text-transform:uppercase; color:#9aa0ab;
    pointer-events:none;
  }
  svg{width:100%; height:100%; display:block}
  .ribbon{cursor:pointer}
  .band{cursor:pointer}
  .district{cursor:pointer; transition:opacity .12s}
  .station{cursor:pointer; transition:opacity .12s}
  .node-label{font-family:var(--mono); fill:#3a3f49; pointer-events:none; user-select:none}
  .side-label{font-family:var(--ui); font-weight:700; letter-spacing:.02em; fill:#3f4753}
  .side-sub{font-family:var(--mono); fill:#8b929e}
  @media (max-width:560px){ main{flex-direction:column} #chordPanel,#mapPanel{flex:1 1 0} #mapPanel{border-left:none; border-top:1px solid var(--hair)} }
  footer{
    padding:9px 26px; border-top:1px solid var(--hair); background:var(--card);
    font-family:var(--mono); font-size:11.5px; color:var(--muted);
    display:flex; justify-content:space-between; gap:16px; flex-wrap:wrap;
  }
  #tip{
    position:fixed; pointer-events:none; z-index:20; opacity:0; transform:translateY(2px);
    transition:opacity .12s; background:#10131aee; color:#f3f4f6; border-radius:8px;
    padding:9px 11px; font-size:12px; line-height:1.45; max-width:260px;
    box-shadow:0 6px 22px #0003; backdrop-filter:blur(3px);
  }
  #tip .tt-h{font-weight:700; margin-bottom:3px}
  #tip .tt-big{font-family:var(--mono); font-size:14px}
  #tip .tt-row{font-family:var(--mono); color:#c3c7cf; font-size:11px}
  #tip .arw{color:#7fb2ff}
  @media (max-width:560px){ input[type=range]{width:150px} h1{font-size:18px} }
</style>
</head>
<body>
<header>
  <div class="title-wrap">
    <h1>Trip interchange</h1>
    <p class="sub">Source: <code>All_OD_district</code> &middot; ribbon width &prop; two-way trips &middot; hover to isolate a place, drag the slider to thin out small flows</p>
  </div>
  <div class="controls">
    <div class="ctl">
      <label>Flows</label>
      <div class="btns">
        <button id="byEI" class="on">Ext &harr; Int</button>
        <button id="byII">Int &harr; Int</button>
        <button id="byEE">Ext &harr; Ext</button>
      </div>
    </div>
    <div class="ctl">
      <label for="thr">Minimum trips per pair</label>
      <input id="thr" type="range" min="0" max="1000" value="0">
      <div class="minrow">
        <span class="ge">&ge;</span>
        <input id="thrNum" type="number" min="1" step="1" inputmode="numeric" aria-label="Minimum trips per pair">
        <span class="unit">trips</span>
      </div>
    </div>
    <div class="ctl" id="colorCtl">
      <label>Color ribbons by</label>
      <div class="btns">
        <button id="byStation" class="on">Station</button>
        <button id="byDistrict">District</button>
      </div>
    </div>
    <div class="ctl">
      <label>Ribbon thickness</label>
      <div class="btns">
        <button id="byConst" class="on">Constant</button>
        <button id="byTaper">Tapered</button>
      </div>
    </div>
    <div class="ctl">
      <label>&nbsp;</label>
      <div class="btns"><button id="reset">Reset view</button></div>
    </div>
  </div>
</header>
<main>
  <div class="panel" id="chordPanel">
    <div class="panel-cap">Flow diagram</div>
    <svg id="chart" preserveAspectRatio="xMidYMid meet"></svg>
  </div>
  <div class="panel" id="mapPanel">
    <div class="panel-cap">Region map &middot; hover or click to link</div>
    <svg id="map" preserveAspectRatio="xMidYMid meet"></svg>
  </div>
</main>
<footer>
  <span id="capLeft"></span>
  <span id="capRight">Click a place to pin it &middot; click empty space to clear</span>
</footer>

let MODE = "EI";          // EI | II | EE
const D = () => RAW[MODE];
const ALL_STATIONS = RAW.stations, ALL_DISTRICTS = RAW.districts;

// per-node aggregates for the CURRENT mode (slider-independent tooltips)
let AGG = new Map();       // key `${kind}_${id}` -> {total, links:[{p,pKind,v,out,in}]}
let MAXV = 1, MODE_TOTAL = 1;
function rebuildMode(){
  AGG = new Map();
  const ka = D().kindA, kb = D().kindB;
  const add = (kind,id,p,pKind,v,out,inn)=>{
    const k=kind+"_"+id; let m=AGG.get(k); if(!m){m={total:0,links:[]}; AGG.set(k,m);}
    m.total+=v; m.links.push({p,pKind,v,out,in:inn});
  };
  D().links.forEach(l=>{ add(ka,l.a,l.b,kb,l.v,l.o,l.i); add(kb,l.b,l.a,ka,l.v,l.i,l.o); });
  AGG.forEach(m=>m.links.sort((x,y)=>y.v-x.v));
  MAXV = d3.max(D().links, d=>d.v) || 1;
  MODE_TOTAL = d3.sum(D().links, d=>d.v) || 1;
}

// which nodes survive the current threshold (set in render); drives map fade
const PRESENT = {s:new Set(), t:new Set()};

// ---------- geometry constants ----------
const VB = 1120, CX = VB/2, CY = VB/2, R = 388, BAND = 16, LAB = 12;
const GROUP_GAP = 9, NODE_GAP = 0.32, PULL = 0.48, ARC_STEPS = 22, LABEL_MIN = 1.0;
const fmt = d3.format(",");
const reduce = matchMedia("(prefers-reduced-motion: reduce)").matches;
const TRANS = reduce ? 0 : 430;

// station / district colour scales (stable, indexed against the full lists)
const stationColor = id => d3.interpolatePlasma(0.08 + 0.80 * (ALL_STATIONS.indexOf(id) / Math.max(ALL_STATIONS.length-1,1)));
const districtColor = id => d3.interpolateViridis(0.08 + 0.84 * (ALL_DISTRICTS.indexOf(id) / Math.max(ALL_DISTRICTS.length-1,1)));
const nodeColor = (kind,id) => kind==="s" ? stationColor(id) : districtColor(id);
let colorMode = "station";   // EI only: colour by station vs district
function ribbonFill(r){
  if(MODE==="EI") return colorMode==="station" ? nodeColor("s",r.a) : nodeColor("t",r.b);
  return nodeColor(D().kindA, r.a);   // within-group: colour by one endpoint
}

// ribbon thickness: "tapered" = classic chord ribbon (pinches at centre),
// "constant" = band of the SAME flow-proportional width held constant end-to-end
let widthMode = "constant";
const MINW = 0.5;                           // floor so tiny bands stay visible
const OP = {
  tapered:  {base:0.34, focus:0.82, dim:0.05, solo:0.90, soloDim:0.07},
  constant: {base:0.50, focus:0.90, dim:0.06, solo:0.92, soloDim:0.07},
};
const opv = () => OP[widthMode];
const bandW = d => Math.max(MINW, d.v * (LAYOUT ? LAYOUT.wpf : 0));

// ---------- helpers ----------
const rad = d => d * Math.PI / 180;
function pt(angle, r){ const a = rad(angle); return [r*Math.cos(a), -r*Math.sin(a)]; }
function arcPts(a0, a1, r){
  const out=[]; for(let k=0;k<=ARC_STEPS;k++){ out.push(pt(a0+(a1-a0)*k/ARC_STEPS, r)); } return out;
}
function ribbonD(la0,la1,ra0,ra1){
  const s=arcPts(la0,la1,R), t=arcPts(ra0,ra1,R);
  const se=s[s.length-1], te=t[t.length-1];
  let d="M"+s[0][0]+","+s[0][1];
  for(let k=1;k<s.length;k++) d+="L"+s[k][0]+","+s[k][1];
  d+="Q"+(PULL*se[0])+","+(PULL*se[1])+" "+t[0][0]+","+t[0][1];
  for(let k=1;k<t.length;k++) d+="L"+t[k][0]+","+t[k][1];
  d+="Q"+(PULL*te[0])+","+(PULL*te[1])+" "+s[0][0]+","+s[0][1]+"Z";
  return d;
}
function bandD(a0,a1){
  const o=arcPts(a0,a1,R+BAND), i=arcPts(a1,a0,R);
  let d="M"+o[0][0]+","+o[0][1];
  for(let k=1;k<o.length;k++) d+="L"+o[k][0]+","+o[k][1];
  for(let k=0;k<i.length;k++) d+="L"+i[k][0]+","+i[k][1];
  return d+"Z";
}
// constant-width connector: a single curve between the sub-arc midpoints,
// bowing toward the centre like the ribbons do
function lineD(la0,la1,ra0,ra1){
  const p1=pt((la0+la1)/2, R), p2=pt((ra0+ra1)/2, R);
  const cx=PULL*(p1[0]+p2[0])/2, cy=PULL*(p1[1]+p2[1])/2;
  return "M"+p1[0]+","+p1[1]+"Q"+cx+","+cy+" "+p2[0]+","+p2[1];
}
// path data + base paint for the current thickness mode
const ribD = d => widthMode==="tapered"
    ? ribbonD(d.la0,d.la1,d.ra0,d.ra1) : lineD(d.la0,d.la1,d.ra0,d.ra1);
function baseStyle(sel){
  if(widthMode==="tapered")
    sel.attr("fill", ribbonFill).attr("stroke","none").attr("stroke-width",0);
  else
    sel.attr("fill","none").attr("stroke", ribbonFill)
       .attr("stroke-width", bandW).attr("stroke-linecap","butt");
}

// ---------- layout ----------
function layAngles(nodes, tot, start, end, total){
  const span = end - start, dir = Math.sign(span);
  const usable = Math.abs(span) - NODE_GAP*(nodes.length-1);
  const per = total ? usable/total : 0;
  let cur = start; const out = {};
  nodes.forEach(id => { const seg = tot[id]*per; out[id] = {a0:cur, a1:cur+dir*seg}; cur += dir*(seg+NODE_GAP); });
  return out;
}
function buildLayout(minV){
  return D().layout==="bipartite" ? layoutBipartite(minV) : layoutCircular(minV);
}

// External <-> Internal: two opposing arcs, one undirected ribbon per pair
function layoutBipartite(minV){
  const ka=D().kindA, kb=D().kindB;
  const links = D().links.filter(l => l.v >= minV);
  const lm = new Map(links.map(l => [l.a+"_"+l.b, l]));
  const aTot={}, bTot={};
  links.forEach(l => { aTot[l.a]=(aTot[l.a]||0)+l.v; bTot[l.b]=(bTot[l.b]||0)+l.v; });
  const aNodes = D().nodesA.filter(id => aTot[id]>0);
  const bNodes = D().nodesB.filter(id => bTot[id]>0);
  const total = d3.sum(aNodes, id => aTot[id]);
  const g = GROUP_GAP/2;
  const aSpan = layAngles(aNodes, aTot, 90+g, 270-g, total);
  const bSpan = layAngles(bNodes, bTot, 90-g, -90+g, total);
  const aCur={}; aNodes.forEach(id => aCur[id]=aSpan[id].a0);
  const bCur={}; bNodes.forEach(id => bCur[id]=bSpan[id].a0);
  const recs={};
  aNodes.forEach(a => {
    const span = aSpan[a].a1 - aSpan[a].a0;
    bNodes.forEach(b => {
      const l = lm.get(a+"_"+b); if(!l) return;
      const seg = span*(l.v/aTot[a]); const a0=aCur[a], a1=a0+seg; aCur[a]=a1;
      recs[a+"_"+b] = {a, b, aKind:ka, bKind:kb, o:l.o, i:l.i, v:l.v, la0:a0, la1:a1};
    });
  });
  bNodes.forEach(b => {
    const span = bSpan[b].a1 - bSpan[b].a0;
    aNodes.forEach(a => {
      const r = recs[a+"_"+b]; if(!r) return;
      const seg = span*(r.v/bTot[b]); const a0=bCur[b], a1=a0+seg; bCur[b]=a1;
      r.ra0=a0; r.ra1=a1;
    });
  });
  const usableA = (180 - GROUP_GAP) - NODE_GAP*Math.max(aNodes.length-1,0);
  const wpf = total ? (usableA*Math.PI/180)*R/total : 0;
  const nodes = aNodes.map(id=>({id,kind:ka,a0:aSpan[id].a0,a1:aSpan[id].a1}))
          .concat(bNodes.map(id=>({id,kind:kb,a0:bSpan[id].a0,a1:bSpan[id].a1})));
  const present = {s:new Set(), t:new Set()};
  (ka==="s"?present.s:present.t) === present.s; // noop
  aNodes.forEach(id => (ka==="s"?present.s:present.t).add(id));
  bNodes.forEach(id => (kb==="s"?present.s:present.t).add(id));
  return {ribbons:Object.values(recs), nodes, present, wpf,
          shownTrips:d3.sum(links,l=>l.v), count:links.length, bipartite:true};
}

// Within-group: all nodes on one ring, one undirected ribbon per pair
function layoutCircular(minV){
  const kind = D().kindA;
  const links = D().links.filter(l => l.v >= minV);
  const tot={};
  links.forEach(l => { tot[l.a]=(tot[l.a]||0)+l.v; tot[l.b]=(tot[l.b]||0)+l.v; });
  const nodeIds = D().nodesA.filter(id => tot[id]>0);
  const idx = new Map(nodeIds.map((id,k)=>[id,k]));
  const total = d3.sum(nodeIds, id => tot[id]);              // = 2 * sum(v)
  // ring: start at top (90deg) going clockwise (decreasing angle)
  const usable = 360 - NODE_GAP*nodeIds.length;
  const per = total ? usable/total : 0;
  const span={}; let cur=90;
  nodeIds.forEach(id => { const seg=tot[id]*per; span[id]={a0:cur, a1:cur-seg}; cur-=seg+NODE_GAP; });
  // adjacency: each node's partners, ordered by partner ring position
  const adj=new Map(); nodeIds.forEach(id=>adj.set(id,[]));
  links.forEach(l => { adj.get(l.a).push(l); adj.get(l.b).push(l); });
  const sub=new Map();   // `${node}_${partner}` -> [start,end]
  nodeIds.forEach(id => {
    const arc = span[id].a1 - span[id].a0;   // negative (clockwise)
    const parts = adj.get(id).slice().sort((p,q)=>{
      const pp = (p.a===id?p.b:p.a), qq = (q.a===id?q.b:q.a);
      return idx.get(pp)-idx.get(qq);
    });
    let c = span[id].a0;
    parts.forEach(l => {
      const other = l.a===id ? l.b : l.a;
      const seg = arc*(l.v/tot[id]); sub.set(id+"_"+other,[c,c+seg]); c+=seg;
    });
  });
  const recs = links.map(l => {
    const la=sub.get(l.a+"_"+l.b), ra=sub.get(l.b+"_"+l.a);
    return {a:l.a, b:l.b, aKind:kind, bKind:kind, o:l.o, i:l.i, v:l.v,
            la0:la[0], la1:la[1], ra0:ra[0], ra1:ra[1]};
  });
  const wpf = total ? (usable*Math.PI/180)*R/total : 0;
  const nodes = nodeIds.map(id=>({id,kind,a0:span[id].a0,a1:span[id].a1}));
  const present = {s:new Set(), t:new Set()};
  nodeIds.forEach(id => (kind==="s"?present.s:present.t).add(id));
  return {ribbons:recs, nodes, present, wpf,
          shownTrips:d3.sum(links,l=>l.v), count:links.length, bipartite:false};
}

// side labels
const sl = root.append("g");
sl.append("text").attr("class","side-label").attr("x",-(R+74)).attr("y",-6)
  .attr("text-anchor","middle").attr("transform",`rotate(-90,${-(R+74)},-6)`)
  .attr("font-size",16).text("External stations");
sl.append("text").attr("class","side-sub").attr("x",-(R+74)).attr("y",14)
  .attr("text-anchor","middle").attr("transform",`rotate(-90,${-(R+74)},14)`)
  .attr("font-size",12).text(RAW.leftRange[0]+"\u2013"+RAW.leftRange[1]);
sl.append("text").attr("class","side-label").attr("x",(R+74)).attr("y",-6)
  .attr("text-anchor","middle").attr("transform",`rotate(90,${R+74},-6)`)
  .attr("font-size",16).text("Internal districts");
sl.append("text").attr("class","side-sub").attr("x",(R+74)).attr("y",14)
  .attr("text-anchor","middle").attr("transform",`rotate(90,${R+74},14)`)
  .attr("font-size",12).text(RAW.rightRange[0]+"\u2013"+RAW.rightRange[1]);
// centred caption shown for the within-group (circular) modes
const cmid = root.append("text").attr("class","side-label")
  .attr("text-anchor","middle").attr("y",-(R+40)).attr("font-size",15)
  .style("display","none");

const tip = d3.select("#tip");
let focus = null;   // {kind:'s'|'t', id} on hover
let pinned = null;  // persists on click

// ---------- linked region map ----------
const MVB_W = 660, MVB_H = 700, MPAD = 24;
const mapSvg = d3.select("#map").attr("viewBox", [0,0,MVB_W,MVB_H]);
let mapProj, mapPath, mapDist, mapStat;
function createMap(){
  const fc = {type:"FeatureCollection", features:
     GEO.districts.features.concat(GEO.stations.map(s =>
       ({type:"Feature", geometry:{type:"Point", coordinates:[s.lon,s.lat]}})))};
  mapProj = d3.geoMercator().fitExtent([[MPAD,MPAD],[MVB_W-MPAD,MVB_H-MPAD]], fc);
  mapPath = d3.geoPath(mapProj);
  const gD = mapSvg.append("g"), gS = mapSvg.append("g");
  mapDist = gD.selectAll("path").data(GEO.districts.features, d=>d.id).join("path")
    .attr("class","district").attr("d", mapPath)
    .on("mouseover",(e,d)=>{ if(pinned) return; focus={kind:"t",id:d.id}; applyFocus(); nodeTip(e,"t",d.id); })
    .on("mousemove",moveTip).on("mouseout",clearFocus)
    .on("click",(e,d)=>{ togglePin("t",d.id); e.stopPropagation(); });
  mapStat = gS.selectAll("circle").data(GEO.stations, d=>d.id).join("circle")
    .attr("class","station")
    .attr("cx",d=>mapProj([d.lon,d.lat])[0]).attr("cy",d=>mapProj([d.lon,d.lat])[1])
    .on("mouseover",(e,d)=>{ if(pinned) return; focus={kind:"s",id:d.id}; applyFocus(); nodeTip(e,"s",d.id); })
    .on("mousemove",moveTip).on("mouseout",clearFocus)
    .on("click",(e,d)=>{ togglePin("s",d.id); e.stopPropagation(); });
}
mapSvg.on("click", ()=>{ pinned=null; applyFocus(); });

function togglePin(kind,id){
  if(pinned && pinned.kind===kind && pinned.id===id) pinned=null;
  else pinned={kind,id};
  focus=null; applyFocus();
}

// reflect threshold (fade) + selection (highlight + connected places) on the map
function drawMapState(){
  if(!mapDist) return;
  const f = pinned || focus;
  const connT = new Set(), connS = new Set();
  if(f){
    LAYOUT.ribbons.forEach(r=>{
      if(connected(r)){
        const oa = (r.aKind===f.kind && r.a===f.id);  // is endpoint a the focus?
        const other = oa ? {k:r.bKind,id:r.b} : {k:r.aKind,id:r.a};
        (other.k==="s"?connS:connT).add(other.id);
      }
    });
  }
  mapDist
    .attr("fill", d=> PRESENT.t.has(d.id) ? districtColor(d.id) : "#d4d7dd")
    .style("opacity", d=>{
      const present = PRESENT.t.has(d.id);
      if(!f) return present ? 0.92 : 0.30;
      if(f.kind==="t" && f.id===d.id) return 1;
      if(connT.has(d.id)) return 0.95;
      return present ? 0.12 : 0.07;
    })
    .attr("stroke", d=> (f && f.kind==="t" && f.id===d.id) ? "#10131a" : "#ffffff")
    .attr("stroke-width", d=> (f && f.kind==="t" && f.id===d.id) ? 2 : 0.6);
  mapDist.filter(d=> f && f.kind==="t" && f.id===d.id).raise();
  mapStat
    .attr("fill", d=> PRESENT.s.has(d.id) ? stationColor(d.id) : "#c2c6cd")
    .style("opacity", d=>{
      const present = PRESENT.s.has(d.id);
      if(!f) return present ? 0.95 : 0.32;
      if(f.kind==="s" && f.id===d.id) return 1;
      if(connS.has(d.id)) return 1;
      return present ? 0.15 : 0.09;
    })
    .attr("r", d=> (f && f.kind==="s" && f.id===d.id) ? 6.6
                 : (connS.has(d.id) ? 4.6 : 3.3))
    .attr("stroke", d=> (f && f.kind==="s" && f.id===d.id) ? "#10131a" : "#ffffff")
    .attr("stroke-width", d=> (f && f.kind==="s" && f.id===d.id) ? 1.6 : 0.7);
  mapStat.filter(d=> f && f.kind==="s" && f.id===d.id).raise();
}
createMap();

// ---------- render ----------
let LAYOUT = null;
function render(minV, animate=true){
  LAYOUT = buildLayout(minV);
  const L = LAYOUT;
  const dur = animate ? TRANS : 0;

  // ribbons (heaviest last)
  const sorted = L.ribbons.slice().sort((a,b)=>a.v-b.v);
  const rib = gRib.selectAll("path.ribbon").data(sorted, d => d.a+"_"+d.b);
  rib.exit().transition().duration(dur).style("opacity",0).remove();
  const merged = rib.enter().append("path").attr("class","ribbon")
      .attr("d", ribD).style("opacity",0)
      .on("mouseover", ribOver).on("mousemove", moveTip).on("mouseout", clearFocus)
    .merge(rib)
      .on("mouseover", ribOver).on("mousemove", moveTip).on("mouseout", clearFocus);
  baseStyle(merged);
  if(animate) merged.transition().duration(TRANS).attr("d", ribD);
  else merged.attr("d", ribD);

  // node bands
  const band = gBand.selectAll("path.band").data(L.nodes, d => d.kind+d.id);
  band.exit().remove();
  band.enter().append("path").attr("class","band")
      .attr("stroke","#fff").attr("stroke-width",.6)
      .on("mouseover", nodeOver).on("mousemove", moveTip).on("mouseout", clearFocus)
      .on("click", nodeClick)
    .merge(band)
      .attr("fill", d => nodeColor(d.kind,d.id))
      .transition().duration(dur)
      .attr("d", d => bandD(d.a0,d.a1));

  // labels (only wide-enough arcs)
  const labNodes = L.nodes.filter(d => Math.abs(d.a1-d.a0) >= LABEL_MIN);
  const lab = gLab.selectAll("text.node-label").data(labNodes, d => d.kind+d.id);
  lab.exit().remove();
  lab.enter().append("text").attr("class","node-label").attr("font-size",8)
      .attr("dominant-baseline","central")
    .merge(lab)
      .each(function(d){
        const mid=(d.a0+d.a1)/2, p=pt(mid,R+BAND+LAB);
        let rot=-mid, anchor="start";
        if(Math.cos(rad(mid))<0){ rot=-mid+180; anchor="end"; }
        d3.select(this).attr("text-anchor",anchor)
          .attr("transform",`translate(${p[0]},${p[1]}) rotate(${rot})`)
          .text(d.id);
      });

  // side labels: bipartite shows L/R captions, circular shows a centred title
  sl.style("display", L.bipartite ? null : "none");
  cmid.style("display", L.bipartite ? "none" : null)
      .text(MODE==="II" ? "Internal districts \u00b7 district-to-district"
                        : "External stations \u00b7 station-to-station");

  applyFocus();
  PRESENT.s = L.present.s; PRESENT.t = L.present.t;
  drawMapState();
  const pct = (L.shownTrips/MODE_TOTAL*100);
  d3.select("#capLeft").text(
     `${fmt(L.count)} of ${fmt(D().links.length)} pairs shown \u00b7 ${pct.toFixed(0)}% of ${fmt(MODE_TOTAL)} ${MODE==="EI"?"between-group":"interchange"} trips`);
}

// ---------- focus / highlight ----------
function connected(r){ // ribbon vs focus
  const f = pinned || focus; if(!f) return true;
  return (r.aKind===f.kind && r.a===f.id) || (r.bKind===f.kind && r.b===f.id);
}
function nodeTouches(n){ // does any shown ribbon link focus to node n?
  const f = pinned || focus; if(!f) return false;
  if(f.kind===n.kind && f.id===n.id) return true;
  return LAYOUT.ribbons.some(r => connected(r) &&
     ((r.aKind===n.kind && r.a===n.id) || (r.bKind===n.kind && r.b===n.id)));
}
function applyFocus(){
  const f = pinned || focus;
  const o = opv();
  const rib = gRib.selectAll("path.ribbon")
    .style("opacity", d => !f ? o.base : (connected(d) ? o.focus : o.dim));
  if(widthMode==="tapered"){
    rib.attr("stroke", d => f && connected(d) ? "#ffffff" : "none")
       .attr("stroke-width", d => f && connected(d) ? .5 : 0);
  } else {
    rib.attr("stroke", ribbonFill).attr("stroke-width", bandW);
  }
  gBand.selectAll("path.band").style("opacity", d => !f ? 1 : (nodeTouches(d) ? 1 : 0.28));
  drawMapState();
}
function nodeOver(e,d){ if(pinned) return; focus={kind:d.kind,id:d.id}; applyFocus(); nodeTip(e,d.kind,d.id); }
function ribOver(e,d){ if(pinned) return; focus=null; applyFocus();
  const o = opv();
  const rib = gRib.selectAll("path.ribbon").style("opacity", x => x===d?o.solo:o.soloDim);
  if(widthMode==="tapered")
    rib.attr("stroke", x=>x===d?"#fff":"none").attr("stroke-width", x=>x===d?.6:0);
  else
    rib.attr("stroke", ribbonFill).attr("stroke-width", bandW);
  ribTip(e,d);
}
function clearFocus(){ if(!pinned){ focus=null; applyFocus(); } tip.style("opacity",0); }
function nodeClick(e,d){
  if(pinned && pinned.kind===d.kind && pinned.id===d.id){ pinned=null; }
  else { pinned={kind:d.kind,id:d.id}; }
  focus=null; applyFocus(); e.stopPropagation();
}
svg.on("click", ()=>{ pinned=null; applyFocus(); });

// ---------- tooltip ----------
const KIND_NAME = {s:"Station", t:"District"};
function moveTip(e){ tip.style("left",(e.clientX+15)+"px").style("top",(e.clientY+15)+"px"); }
function nodeTip(e, kind, id){
  const agg = AGG.get(kind+"_"+id);
  const total = agg ? agg.total : 0;
  const links = agg ? agg.links : [];
  const top = links.slice(0,3).map(l =>
     `<div class="tt-row">${l.p} &middot; ${fmt(l.v)}</div>`).join("");
  const inMode = (kind==="s" ? PRESENT.s : PRESENT.t).has(id);
  const note = (!agg)
     ? `<div class="tt-row" style="color:#9aa0ab">no flows in this view</div>`
     : (!inMode ? `<div class="tt-row" style="color:#ff9a9a">below current threshold</div>` : "");
  tip.html(
    `<div class="tt-h">${KIND_NAME[kind]} ${id}</div>`+
    `<div class="tt-big">${fmt(total)} trips</div>`+
    `<div class="tt-row">${links.length} partner ${links.length===1?"place":"places"}</div>`+
    note + top
  ).style("opacity",1);
  moveTip(e);
}
function ribTip(e,d){
  tip.html(
    `<div class="tt-h">${KIND_NAME[d.aKind]} ${d.a} &harr; ${KIND_NAME[d.bKind]} ${d.b}</div>`+
    `<div class="tt-big">${fmt(d.v)} trips</div>`+
    `<div class="tt-row"><span class="arw">&rarr;</span> ${fmt(d.o)} &nbsp; `+
    `<span class="arw">&larr;</span> ${fmt(d.i)}</div>`
  ).style("opacity",1);
  moveTip(e);
}

// ---------- controls ----------
const thr = document.getElementById("thr");
const thrNum = document.getElementById("thrNum");
let currentMinV = 1;

function sliderToMinV(p){ return Math.max(1, Math.round(Math.pow(MAXV, p/1000))); }
function minVToSlider(v){
  v = Math.max(1, Math.min(MAXV, v));
  return Math.max(0, Math.min(1000, Math.round(1000*Math.log(v)/Math.log(MAXV))));
}
function applyMinV(v, {skipSlider=false, skipNum=false}={}){
  v = Math.max(1, Math.min(MAXV, Math.round(v)));
  currentMinV = v;
  if(!skipSlider) thr.value = minVToSlider(v);
  if(!skipNum) thrNum.value = v;
  render(v);
}

thr.addEventListener("input", ()=> applyMinV(sliderToMinV(+thr.value), {skipSlider:true}));
thrNum.addEventListener("input", ()=>{
  const raw = parseInt(thrNum.value, 10);
  if(!Number.isFinite(raw) || raw < 1) return;
  applyMinV(raw, {skipNum:true});
});
thrNum.addEventListener("change", ()=>{
  const raw = parseInt(thrNum.value, 10);
  applyMinV(Number.isFinite(raw) ? raw : 1);
});

// flow-type switch
const FLOWS = {EI:"#byEI", II:"#byII", EE:"#byEE"};
function setMode(m){
  MODE = m; rebuildMode();
  pinned=null; focus=null;
  Object.entries(FLOWS).forEach(([k,sel])=> d3.select(sel).classed("on", k===m));
  d3.select("#colorCtl").style("display", m==="EI" ? "flex" : "none");
  applyMinV(1);   // show all at the new mode's scale
}
d3.select("#byEI").on("click", ()=> setMode("EI"));
d3.select("#byII").on("click", ()=> setMode("II"));
d3.select("#byEE").on("click", ()=> setMode("EE"));

document.getElementById("reset").addEventListener("click", ()=>{
  pinned=null; focus=null; colorMode="station"; widthMode="constant";
  d3.select("#byStation").classed("on",true); d3.select("#byDistrict").classed("on",false);
  d3.select("#byConst").classed("on",true); d3.select("#byTaper").classed("on",false);
  setMode("EI");
});
d3.select("#byStation").on("click", ()=>{ colorMode="station";
  d3.select("#byStation").classed("on",true); d3.select("#byDistrict").classed("on",false); render(currentMinV,false); });
d3.select("#byDistrict").on("click", ()=>{ colorMode="district";
  d3.select("#byDistrict").classed("on",true); d3.select("#byStation").classed("on",false); render(currentMinV,false); });
d3.select("#byTaper").on("click", ()=>{ widthMode="tapered";
  d3.select("#byTaper").classed("on",true); d3.select("#byConst").classed("on",false); render(currentMinV,false); });
d3.select("#byConst").on("click", ()=>{ widthMode="constant";
  d3.select("#byConst").classed("on",true); d3.select("#byTaper").classed("on",false); render(currentMinV,false); });

rebuildMode();
applyMinV(1);
</script>
</body>
